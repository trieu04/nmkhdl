name: B01_baseline
phase: B
notes: "Baseline tái hiện: Adam 1e-3, CE invfreq, 40ep, aug đầy đủ"

n_splits: 3
epochs: 40
batch_size: 128
seed: 42
amp: true
early_stopping_patience: 0

model:
  type: cnn
  filters: [32, 64, 128]
  kernels: [7, 5, 3]
  dropout: 0.3

optim:
  type: adam
  lr: 1.0e-3
  weight_decay: 1.0e-4

sched:
  type: none

loss:
  type: ce
  class_weight: invfreq

augment:
  enabled: true
  use_jitter: true
  use_scale: true
  use_rotation: true
  jitter_sigma: 0.02
  scale_low: 0.9
  scale_high: 1.1
  rot_theta: 0.1
  use_time_warp: false
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
