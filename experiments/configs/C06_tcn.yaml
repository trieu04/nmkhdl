name: C06_tcn
phase: C
notes: "TCN channels [64,64,128,128] kernel 5 dropout 0.2"
n_splits: 3
epochs: 80
batch_size: 128
seed: 42
amp: true
model: {type: tcn, channels: [64,64,128,128], kernel_size: 5, dropout: 0.2}
optim: {type: adam, lr: 1.0e-4, weight_decay: 1.0e-4}
sched: {type: onecycle, max_lr: 3.0e-3}
loss: {type: ce, class_weight: invfreq}
augment:
  enabled: true
  jitter_sigma: 0.02
  scale_low: 0.9
  scale_high: 1.1
  rot_theta: 0.1
