name: E05_time_warp
phase: E
notes: "Time warp on (knots=5, \u03C3=0.2)"
n_splits: 3
epochs: 80
batch_size: 128
seed: 42
amp: true
model:
  type: resnet
  filters:
  - 64
  - 128
  - 256
  dropout: 0.3
optim:
  type: adam
  lr: 0.0001
  weight_decay: 0.0001
sched:
  type: onecycle
  max_lr: 0.003
loss:
  type: ce
  class_weight: invfreq
augment:
  enabled: true
  jitter_sigma: 0.02
  scale_low: 0.9
  scale_high: 1.1
  rot_theta: 0.1
  use_time_warp: true
  tw_knots: 5
  tw_sigma: 0.2
