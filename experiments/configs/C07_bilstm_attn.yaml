name: C07_bilstm_attn
phase: C
notes: "BiLSTM hidden=128 layers=2 + attention dropout 0.3"
n_splits: 3
epochs: 80
batch_size: 128
seed: 42
amp: true
model: {type: bilstm, hidden: 128, num_layers: 2, dropout: 0.3}
optim: {type: adam, lr: 1.0e-4, weight_decay: 1.0e-4}
sched: {type: onecycle, max_lr: 3.0e-3}
loss: {type: ce, class_weight: invfreq}
augment:
  enabled: true
  jitter_sigma: 0.02
  scale_low: 0.9
  scale_high: 1.1
  rot_theta: 0.1
