name: G03_tcn_big
phase: G
notes: TCN channels [128,128,256,256]
n_splits: 3
epochs: 80
batch_size: 128
seed: 42
amp: true
model:
  type: tcn
  filters:
  - 64
  - 128
  - 256
  dropout: 0.2
  channels:
  - 128
  - 128
  - 256
  - 256
  kernel_size: 5
optim:
  type: adam
  lr: 0.0001
  weight_decay: 0.0001
sched:
  type: onecycle
  max_lr: 0.003
loss:
  type: ce
  class_weight: invfreq
augment:
  enabled: true
  jitter_sigma: 0.02
  scale_low: 0.9
  scale_high: 1.1
  rot_theta: 0.1
